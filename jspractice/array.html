<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var arr1 = [1, 3, 5], arr2 = [2, 4, 6]
        document.write(arr1.concat(arr2))
        document.write("<br>")
        var t = "Touhidul Islam"
        document.write(t[11], "<br>")
        var arr = Array.from(t)
        document.write(arr)
        document.write("<br>")

        var f = [30, 50, 100, 1, -4, 6, 60, 80]
        document.write(f.filter(fun)) //all
        document.write("<br>")

        function fun(item) {
            return item > 50
        }
        
        document.write(f.find(fun)) //first
        document.write("<br>")
        
    </script>

</body>

</html>
