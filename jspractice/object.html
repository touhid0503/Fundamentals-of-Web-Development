<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        var a=new Date()
        document.write(a.getDate()," ",a.getDay()," ",a.getFullYear()," ")

        document.write( Math.ceil(3.7))
        document.write("<br>")

        document.write(Math.max(1,8,-1,10))
        
    </script>
